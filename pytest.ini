[pytest]
testpaths = tests/ui
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --headed
    --video=retain-on-failure
    --screenshot=only-on-failure
    --reruns 2
    --reruns-delay 2
    --alluredir=allure-results
markers =
    desktop: тесты для десктопной версии
    mobile: тесты для мобильной версии
    smoke: критические сценарии
    regression: полная регрессия
    filters: тесты фильтров
    stats: тесты статистики
    theme: тесты темы